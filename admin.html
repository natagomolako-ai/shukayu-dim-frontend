<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Адміністратора | Шукаю дім</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        /* Стилі для адмінки */
        body { background-color: #fcf8f5; margin: 0; font-family: Arial, sans-serif; }

        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .request-card {
            border: 2px solid #f0f0f0;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
        }

        .request-info { flex-grow: 1; }

        .admin-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }

        .btn-approve { background: #4CAF50; color: white; }
        .btn-reject { background: #f44336; color: white; }
        
        .back-btn {
            display: inline-block;
            padding: 8px 25px;
            border: 2px solid #6B1C1C;
            border-radius: 25px;
            color: #6B1C1C;
            text-decoration: none;
            font-weight: bold;
            background-color: white;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #6B1C1C;
            color: white;
        }

        /* Кнопка створення нового оголошення */
        .create-btn {
            display: inline-block;
            background: #6B1C1C;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
            margin-bottom: 25px;
        }

        .create-btn:hover {
            background: #4a1313;
            transform: translateY(-2px);
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 50px 20px 50px;
        }

        .admin-header-side { flex: 1; }
        .admin-header-center { flex: 2; text-align: center; }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-side">
            <a href="index.html" class="back-btn">← На головну</a>
        </div>
        
        <div class="admin-header-center">
            <h2 style="margin: 0; color: #6B1C1C;">Адміністратор 🐾</h2>
        </div>
        
        <div class="admin-header-side" style="text-align: right;">
        </div>
    </header>

    <div class="admin-container">
        <div style="text-align: center;">
            <a href="add-pet.html?admin=true" class="create-btn">
                ➕ Створити нове оголошення
            </a>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

        <h3>Нові оголошення на перевірку:</h3>
        
        <div id="requests-list">
            <p>Завантаження заявок з бази даних...</p>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
